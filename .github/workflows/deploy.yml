name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          REMOTE="$EC2_USER@$EC2_HOST"
          DEPLOY_DIR="/opt/remix"

          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            build \
            package.json \
            pnpm-lock.yaml \
            "$REMOTE:$DEPLOY_DIR/"

          ssh $SSH_OPTS "$REMOTE" << 'EOF'
            cd /opt/remix
            pnpm install --frozen-lockfile --prod
            sudo systemctl restart remix
          EOF
